<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>සඳුනිගේ උපන්දිනය! 🎉</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            /* ලස්සන Vibrant Background එකක් */
            background: linear-gradient(135deg, #1d1a39, #451e3e);
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            min-height: 100vh;
        }

        .hero {
            background: linear-gradient(135deg, rgba(130, 2, 99, 0.9), rgba(69, 30, 62, 0.7)); 
            color: white;
            padding: 60px 0 40px;
            border-radius: 0 0 40px 40px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-bottom: 2px solid #ff007f;
        }

        .friend-photo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid #ff007f;
            object-fit: cover;
            box-shadow: 0 5px 20px rgba(255, 0, 127, 0.5);
            margin-bottom: 20px;
        }

        .upload-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            color: #fff;
        }

        .upload-card input, .upload-card textarea {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
        }

        .upload-card input::placeholder, .upload-card textarea::placeholder {
            color: #ddd;
        }

        .upload-card input:focus, .upload-card textarea:focus {
            background: rgba(255, 255, 255, 0.3);
            color: #fff;
            border-color: #ff007f;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.5);
        }

        .btn-custom {
            background: linear-gradient(45deg, #ff007f, #7928ca);
            color: white;
            border: none;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background: linear-gradient(45deg, #7928ca, #ff007f);
            color: white;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.6);
        }

        .wish-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        .wish-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(255, 0, 127, 0.3);
        }

        .wish-card img, .wish-card video {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
            cursor: pointer;
        }

        .wish-msg {
            padding: 20px;
            font-weight: 600;
            text-align: center;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        footer {
            text-align: center;
            padding: 30px 0;
            margin-top: 50px;
            background: rgba(0, 0, 0, 0.4);
        }

        .created-by {
            font-size: 0.85em;
            color: #bbb;
            font-style: italic;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="hero text-center shadow-lg">
    <div class="container">
        <!-- සඳුනිගේ Photo එකේ Cloudinary ලින්ක් එක මෙතනට දාන්න -->
        <img id="friendPhoto" src="" alt="Sanduni" class="friend-photo d-none"> 
        <h1 class="display-4 fw-bold">සඳුනිගේ උපන්දිනය! 🎉🎂</h1>
        <p class="lead">ඔයාලගේ ලස්සන සුබ පැතුම් සහ මතකයන් මෙතනට එකතු කරන්න...</p>
    </div>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-7 upload-card">
            <h5 class="text-center mb-3">මතකයන් අප්ලෝඩ් කරන්න</h5>
            <input type="file" id="fileInput" class="form-control mb-2" accept="image/*,video/*">
            <textarea id="msgInput" class="form-control mb-3" placeholder="ලස්සන සුබ පැතුමක් ලියන්න..." rows="3"></textarea>
            <button id="uploadBtn" class="btn btn-custom w-100 fw-bold btn-lg">Upload & Wish Now!</button>
            <div id="status" class="text-center small mt-2"></div>
        </div>
    </div>

    <div class="row mt-5" id="gallery">
        <!-- පෝස්ට් මෙතනට ලෝඩ් වෙයි -->
    </div>
</div>

<!-- Modal (Full-screen view) -->
<div class="modal fade" id="mediaModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-xl">
        <div class="modal-content" style="background: transparent; border: none;">
            <div class="modal-body p-0 text-center position-relative">
                <div id="modalContent"></div>
                <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-3" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
        </div>
    </div>
</div>

<footer>
    <div class="container">
        <p class="created-by">Created By Mr. Charu</p>
    </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    // ඔයා දුන්න Firebase Config එක
    const firebaseConfig = {
        apiKey: "AIzaSyDF8J1bW3iP1IYt_OufSbzEN3Yxes9bUm0",
        authDomain: "sanduni-ef227.firebaseapp.com",
        projectId: "sanduni-ef227",
        storageBucket: "sanduni-ef227.firebasestorage.app",
        messagingSenderId: "56755370734",
        appId: "1:56755370734:web:e51728cd98b8013ff8d1ff",
        measurementId: "G-27F253K8GS"
    };

    // --- මෙතනට ඔයාගේ Cloudinary විස්තර දෙන්න ---
    const CLOUD_NAME = "dokszdfdm"; // ඔයාගේ පරණ එකම පාවිච්චි කරන්න පුළුවන්
    const UPLOAD_PRESET = "rashmika_preset"; // පරණ Preset එකම පාවිච්චි කරන්න පුළුවන් (හැබැයි ඒක Unsigned වෙන්න ඕනේ)

    // සඳුනිගේ Photo එක පෙන්වීම
    const FRIEND_PHOTO_URL = "YOUR_SANDUNI_PHOTO_CLOUDINARY_URL"; // මෙතනට ලින්ක් එක දාන්න
    const friendPhotoImg = document.getElementById('friendPhoto');
    if (FRIEND_PHOTO_URL && FRIEND_PHOTO_URL !== "YOUR_SANDUNI_PHOTO_CLOUDINARY_URL") {
        friendPhotoImg.src = FRIEND_PHOTO_URL;
        friendPhotoImg.classList.remove('d-none');
    }

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const uploadBtn = document.getElementById('uploadBtn');
    const fileInput = document.getElementById('fileInput');
    const msgInput = document.getElementById('msgInput');
    const status = document.getElementById('status');
    const gallery = document.getElementById('gallery');

    window.viewMedia = (url, type) => {
        const modalContent = document.getElementById('modalContent');
        if (type === 'image') {
            modalContent.innerHTML = `<img src="${url}" class="img-fluid rounded shadow-lg">`;
        } else {
            modalContent.innerHTML = `<video src="${url}" controls autoplay class="img-fluid rounded shadow-lg"></video>`;
        }
        const myModal = new bootstrap.Modal(document.getElementById('mediaModal'));
        myModal.show();
    };

    uploadBtn.onclick = async () => {
        const file = fileInput.files[0];
        if (!file) return alert("කරුණාකර පින්තූරයක් හෝ වීඩියෝවක් තෝරන්න!");

        uploadBtn.disabled = true;
        status.style.color = "#00ffff";
        status.innerText = "Cloud එකට Upload වෙනවා... 🚀";

        try {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);

            const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            const fileUrl = data.secure_url;

            // සඳුනිගේ අලුත් Collection එක
            await addDoc(collection(db, "sanduni_wishes"), {
                url: fileUrl,
                message: msgInput.value,
                type: file.type.startsWith('image') ? 'image' : 'video',
                time: new Date()
            });

            status.style.color = "#00ff00";
            status.innerText = "සාර්ථකව එක් කළා! ✅";
            fileInput.value = "";
            msgInput.value = "";
        } catch (e) {
            status.style.color = "#ff0000";
            status.innerText = "වැරදීමක් වුණා! Config/Preset චෙක් කරන්න.";
            console.error(e);
        }
        uploadBtn.disabled = false;
    };

    // සඳුනිගේ Gallery එක Live Load කිරීම
    const q = query(collection(db, "sanduni_wishes"), orderBy("time", "desc"));
    onSnapshot(q, (snap) => {
        gallery.innerHTML = "";
        snap.forEach(doc => {
            const item = doc.data();
            let mediaHtml = item.type === 'image' 
                ? `<img src="${item.url}" onclick="viewMedia('${item.url}', 'image')">` 
                : `<video src="${item.url}" onclick="viewMedia('${item.url}', 'video')"></video>`;
            
            gallery.innerHTML += `
                <div class="col-md-4 col-sm-6">
                    <div class="wish-card shadow border">
                        ${mediaHtml}
                        <div class="wish-msg">${item.message || 'Happy Birthday! 🎉'}</div>
                    </div>
                </div>`;
        });
    });
</script>
</body>
</html>
