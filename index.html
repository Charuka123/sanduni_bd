<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Sanduni! ❤️</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: ලස්සන අකුරු මෝස්තර -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-glow: #ff2a85;
            --bg-color: #0b0914;
        }

        body {
            /* Romantic Dark Theme Background */
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(255, 42, 133, 0.2) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(112, 0, 255, 0.2) 0px, transparent 50%);
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif;
            color: #fff;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* Glassmorphism Common Style */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        /* Hero Section */
        .hero {
            padding: 80px 20px 60px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .title-text {
            font-family: 'Great Vibes', cursive;
            font-size: 5rem;
            background: linear-gradient(to right, #ff2a85, #ff7b00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 42, 133, 0.4);
            margin-bottom: 10px;
            animation: fadeInDown 1.5s ease;
        }

        .subtitle {
            font-weight: 300;
            letter-spacing: 2px;
            color: #e0e0e0;
            animation: fadeInUp 1.5s ease;
        }

        .profile-img-container {
            position: relative;
            width: 250px;
            height: 250px;
            margin: 0 auto 30px;
            animation: pulseGlow 3s infinite alternate;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255, 42, 133, 0.5);
            padding: 5px;
        }

        /* Upload Section */
        .upload-section {
            border-radius: 30px;
            padding: 40px;
            margin-top: -30px;
            animation: zoomIn 1s ease;
            position: relative;
            z-index: 10;
        }

        .custom-file-upload {
            border: 2px dashed rgba(255, 42, 133, 0.5);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            display: block;
        }
        .custom-file-upload:hover {
            background: rgba(255, 42, 133, 0.1);
            border-color: #ff2a85;
        }
        input[type="file"] { display: none; }

        .form-control {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            border-radius: 15px;
        }
        .form-control:focus {
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            border-color: #ff2a85;
            box-shadow: 0 0 15px rgba(255, 42, 133, 0.3);
        }

        .btn-glow {
            background: linear-gradient(45deg, #ff2a85, #7000ff);
            border: none;
            border-radius: 30px;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            transition: all 0.4s;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            box-shadow: 0 0 20px rgba(255, 42, 133, 0.4);
        }
        .btn-glow:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(255, 42, 133, 0.7);
        }

        /* Gallery Card */
        .wish-card {
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s;
            margin-bottom: 30px;
        }
        .wish-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5), 0 0 15px rgba(255,42,133,0.3);
            border: 1px solid rgba(255, 42, 133, 0.3);
        }
        .wish-card img, .wish-card video {
            width: 100%;
            height: 250px;
            object-fit: cover;
            cursor: pointer;
        }
        .wish-msg {
            padding: 20px;
            font-size: 1rem;
            font-weight: 300;
            color: #f0f0f0;
            text-align: center;
        }

        /* Animations */
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        @keyframes pulseGlow { 
            0% { box-shadow: 0 0 20px rgba(255,42,133,0.2); } 
            100% { box-shadow: 0 0 50px rgba(255,42,133,0.6); } 
        }

        footer { text-align: center; padding: 40px 0; color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>

<!-- Hero Section -->
<div class="hero">
    <div class="container">
        <div class="profile-img-container">
            <!-- සඳුනිගේ පින්තූරයේ ලින්ක් එක මෙතනට දාන්න -->
            <img src="WhatsApp%20Image%202026-07-06%20at%2000.02.31.jpeg" alt="Sanduni" class="profile-img" id="heroImage">
        </div>
        <h1 class="title-text">Happy Birthday Sanduni</h1>
        <p class="subtitle">I'm Your Best Freind Mahimi... ✨</p>
    </div>
</div>

<!-- Upload Section -->
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="upload-section glass-panel">
                <label class="custom-file-upload mb-4">
                    <input type="file" id="fileInput" accept="image/*,video/*">
                    <i class="fas fa-cloud-upload-alt fa-3x mb-2" style="color: #ff2a85;"></i>
                    <h5 id="fileName" class="mt-2">පින්තූරයක් හෝ වීඩියෝවක් තෝරන්න</h5>
                </label>
                <textarea id="msgInput" class="form-control mb-4" placeholder="හදවතින්ම සුබ පතන්න..." rows="3"></textarea>
                <button id="uploadBtn" class="btn-glow">
                    <i class="fas fa-paper-plane me-2"></i> Upload & Wish
                </button>
                <div id="status" class="text-center mt-3" style="font-weight: 600;"></div>
            </div>
        </div>
    </div>

    <!-- Gallery Section -->
    <div class="row mt-5 pt-4" id="gallery">
        <!-- පෝස්ට් මෙතනට ලෝඩ් වෙයි -->
    </div>
</div>

<!-- Modal (Full-screen Media View) -->
<div class="modal fade" id="mediaModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-xl">
        <div class="modal-content" style="background: transparent; border: none;">
            <div class="modal-body p-0 text-center position-relative">
                <div id="modalContent"></div>
                <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-3" data-bs-dismiss="modal" aria-label="Close" style="filter: drop-shadow(0 0 5px rgba(0,0,0,0.8));"></button>
            </div>
        </div>
    </div>
</div>

<footer>
    <p>Made with <i class="fas fa-heart text-danger"></i> by Mr. Charu</p>
</footer>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Confetti Animation Library -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    // ඔයා දුන්න අලුත් Firebase Config එක
    const firebaseConfig = {
        apiKey: "AIzaSyDF8J1bW3iP1IYt_OufSbzEN3Yxes9bUm0",
        authDomain: "sanduni-ef227.firebaseapp.com",
        projectId: "sanduni-ef227",
        storageBucket: "sanduni-ef227.firebasestorage.app",
        messagingSenderId: "56755370734",
        appId: "1:56755370734:web:e51728cd98b8013ff8d1ff",
        measurementId: "G-27F253K8GS"
    };

    // Cloudinary Config (කලින් එක හරි අලුත් එක හරි)
    const CLOUD_NAME = "dokszdfdm"; 
    const UPLOAD_PRESET = "rashmika_preset"; // මේක Unsigned ද කියල ෂුවර් කරගන්න!

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const uploadBtn = document.getElementById('uploadBtn');
    const fileInput = document.getElementById('fileInput');
    const msgInput = document.getElementById('msgInput');
    const status = document.getElementById('status');
    const gallery = document.getElementById('gallery');
    const fileNameDisplay = document.getElementById('fileName');

    // පේජ් එක ලෝඩ් වෙද්දී Confetti Effect එක
    window.onload = () => {
        var duration = 3000;
        var end = Date.now() + duration;
        (function frame() {
            confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff2a85', '#7000ff', '#ffffff'] });
            confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff2a85', '#7000ff', '#ffffff'] });
            if (Date.now() < end) requestAnimationFrame(frame);
        }());
    };

    // File තේරුවම නම පෙන්වීම
    fileInput.addEventListener('change', function() {
        if(this.files && this.files.length > 0) {
            fileNameDisplay.innerHTML = `<i class="fas fa-check-circle text-success"></i> ${this.files[0].name}`;
        }
    });

    window.viewMedia = (url, type) => {
        const modalContent = document.getElementById('modalContent');
        if (type === 'image') {
            modalContent.innerHTML = `<img src="${url}" class="img-fluid rounded" style="box-shadow: 0 0 30px rgba(255,42,133,0.5); max-height: 85vh;">`;
        } else {
            modalContent.innerHTML = `<video src="${url}" controls autoplay class="img-fluid rounded" style="box-shadow: 0 0 30px rgba(255,42,133,0.5); max-height: 85vh;"></video>`;
        }
        const myModal = new bootstrap.Modal(document.getElementById('mediaModal'));
        myModal.show();
    };

    uploadBtn.onclick = async () => {
        const file = fileInput.files[0];
        if (!file) return alert("I'm Your Best Frriend Mahimi..!");

        uploadBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';
        uploadBtn.disabled = true;
        status.style.color = "#ff7b00";
        status.innerText = "Cloud එකට Upload වෙනවා... 🚀";

        try {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);

            const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            if(data.error) throw new Error(data.error.message);
            const fileUrl = data.secure_url;

            await addDoc(collection(db, "sanduni_wishes"), {
                url: fileUrl,
                message: msgInput.value,
                type: file.type.startsWith('image') ? 'image' : 'video',
                time: new Date()
            });

            // අලුත් පෝස්ට් එකක් දැම්මමත් Confetti ගහමු!
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#ff2a85', '#7000ff'] });

            status.style.color = "#00ff88";
            status.innerHTML = '<i class="fas fa-check-circle"></i> සාර්ථකව එක් කළා!';
            fileInput.value = "";
            fileNameDisplay.innerHTML = "පින්තූරයක් හෝ වීඩියෝවක් තෝරන්න";
            msgInput.value = "";
        } catch (e) {
            status.style.color = "#ff2a2a";
            status.innerText = "වැරදීමක් වුණා! කරුණාකර නැවත උත්සාහ කරන්න.";
            console.error(e);
        }
        uploadBtn.innerHTML = '<i class="fas fa-paper-plane me-2"></i> Upload & Wish';
        uploadBtn.disabled = false;
    };

    const q = query(collection(db, "sanduni_wishes"), orderBy("time", "desc"));
    onSnapshot(q, (snap) => {
        gallery.innerHTML = "";
        snap.forEach(doc => {
            const item = doc.data();
            let mediaHtml = item.type === 'image' 
                ? `<img src="${item.url}" onclick="viewMedia('${item.url}', 'image')">` 
                : `<video src="${item.url}" onclick="viewMedia('${item.url}', 'video')"></video>`;
            
            gallery.innerHTML += `
                <div class="col-lg-4 col-md-6">
                    <div class="wish-card glass-panel">
                        ${mediaHtml}
                        <div class="wish-msg">${item.message || 'Happy Birthday Sanduni! ❤️'}</div>
                    </div>
                </div>`;
        });
    });
</script>
</body>
</html>
